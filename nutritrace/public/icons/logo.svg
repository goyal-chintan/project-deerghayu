<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141720"/>
      <stop offset="100%" stop-color="#0A0B0F"/>
    </linearGradient>
    <linearGradient id="forkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FFFB0"/>
      <stop offset="100%" stop-color="#00C87A"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00C87A"/>
      <stop offset="100%" stop-color="#4FFFB0"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FFFB0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4FFFB0" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle ambient glow -->
  <ellipse cx="300" cy="250" rx="210" ry="170" fill="#4FFFB0" opacity="0.025"/>

  <!-- ── Fork (left side) ── -->
  <!-- Tine 1 -->
  <rect x="118" y="92" width="22" height="118" rx="11" fill="url(#forkGrad)"/>
  <!-- Tine 2 -->
  <rect x="161" y="92" width="22" height="118" rx="11" fill="url(#forkGrad)"/>
  <!-- Tine 3 -->
  <rect x="204" y="92" width="22" height="118" rx="11" fill="url(#forkGrad)"/>

  <!-- Fork neck -->
  <path d="M 129 208 C 129 248 172 260 172 260 C 172 260 215 248 215 208"
        fill="none" stroke="url(#forkGrad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Fork handle -->
  <rect x="161" y="257" width="22" height="166" rx="11" fill="url(#forkGrad)"/>

  <!-- ── Trace line (starts at fork base, sweeps upper-right) ── -->
  <!-- Area fill beneath curve -->
  <path d="M 172 423 C 224 402 302 318 422 148 L 422 423 Z"
        fill="url(#areaGrad)"/>

  <!-- Trace line — soft glow layer -->
  <path d="M 172 423 C 224 402 302 318 422 148"
        fill="none" stroke="#4FFFB0" stroke-width="32" stroke-linecap="round" opacity="0.15"/>

  <!-- Trace line — main stroke -->
  <path d="M 172 423 C 224 402 302 318 422 148"
        fill="none" stroke="url(#lineGrad)" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>

  <!-- End dot — outer glow ring -->
  <circle cx="422" cy="148" r="32" fill="#4FFFB0" opacity="0.20" filter="url(#dotGlow)"/>
  <!-- End dot — solid -->
  <circle cx="422" cy="148" r="18" fill="url(#lineGrad)" filter="url(#glow)"/>
</svg>
